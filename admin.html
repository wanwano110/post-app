<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📬 提出ポスト 管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #d8f3dc;
    --red: #c0392b;
    --red-pale: #fde8e8;
    --yellow: #f4a261;
    --bg: #f0f7f1;
    --text: #1b2f22;
    --gray: #888;
    --radius: 16px;
  }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  /* ログイン画面 */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .card {
    background: #fff;
    border-radius: var(--radius);
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 24px rgba(45,106,79,0.10);
  }

  .logo { font-size: 48px; text-align: center; margin-bottom: 8px; }

  h1 {
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 6px;
  }

  input[type="password"], input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--green-pale);
    border-radius: 10px;
    font-size: 18px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
    letter-spacing: 0.1em;
    color: var(--text);
  }

  input:focus { border-color: var(--green-light); }

  .btn {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn:hover { background: #1b4332; }

  .btn.danger {
    background: var(--red);
    font-size: 14px;
    padding: 10px;
  }

  .btn.danger:hover { background: #922b21; }

  .btn.secondary {
    background: #fff;
    color: var(--green);
    border: 2px solid var(--green-light);
    font-size: 14px;
    padding: 10px;
  }

  .btn.secondary:hover { background: var(--green-pale); }

  /* 管理画面 */
  #adminScreen { display: none; max-width: 680px; margin: 0 auto; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .top-bar h2 { font-size: 20px; color: var(--green); }

  .panel {
    background: #fff;
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(45,106,79,0.08);
  }

  .panel-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--gray);
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .status-badge {
    font-size: 16px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 20px;
    flex: 1;
    text-align: center;
  }

  .status-badge.open   { background: var(--green-pale); color: var(--green); }
  .status-badge.closed { background: var(--red-pale); color: var(--red); }

  .toggle-btn {
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: 0.2s;
  }

  .toggle-btn.open-action   { background: var(--red-pale); color: var(--red); }
  .toggle-btn.close-action  { background: var(--green-pale); color: var(--green); }
  .toggle-btn:hover { opacity: 0.8; }

  .pw-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .pw-row input {
    flex: 1;
    margin-bottom: 0;
    font-size: 20px;
    letter-spacing: 0.3em;
    text-align: center;
  }

  .pw-row .btn {
    width: auto;
    padding: 12px 20px;
    font-size: 14px;
  }

  /* ファイル一覧 */
  .file-list { list-style: none; }

  .file-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--green-pale);
    flex-wrap: wrap;
  }

  .file-item:last-child { border-bottom: none; }

  .file-icon { font-size: 22px; flex-shrink: 0; }

  .file-info { flex: 1; min-width: 0; }

  .file-name-text {
    font-size: 14px;
    font-weight: 700;
    word-break: break-all;
    color: var(--text);
  }

  .file-meta {
    font-size: 12px;
    color: var(--gray);
    margin-top: 2px;
  }

  .file-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .icon-btn {
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: 0.2s;
  }

  .icon-btn.download { background: var(--green-pale); color: var(--green); }
  .icon-btn.delete   { background: var(--red-pale); color: var(--red); }
  .icon-btn:hover    { opacity: 0.75; }

  .empty-msg {
    text-align: center;
    color: var(--gray);
    padding: 32px 0;
    font-size: 15px;
  }

  .refresh-btn {
    background: none;
    border: 2px solid var(--green-light);
    color: var(--green);
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
  }

  .refresh-btn:hover { background: var(--green-pale); }

  .logout-btn {
    background: none;
    border: none;
    color: var(--gray);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    text-decoration: underline;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: #fff;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
  }

  .toast.show { opacity: 1; }

  .err-msg {
    color: var(--red);
    font-size: 14px;
    margin-top: 8px;
    text-align: center;
  }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginScreen">
  <div class="card">
    <div class="logo">📬</div>
    <h1>先生用ログイン</h1>
    <label>管理者パスワード</label>
    <input type="password" id="adminPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">ログイン</button>
    <div class="err-msg" id="loginErr"></div>
  </div>
</div>

<!-- 管理画面 -->
<div id="adminScreen">
  <div class="top-bar">
    <h2>📬 提出ポスト 管理</h2>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>

  <!-- 受付状態 -->
  <div class="panel">
    <div class="panel-title">受付状態</div>
    <div class="status-row">
      <div class="status-badge" id="statusBadge">確認中...</div>
      <button class="toggle-btn" id="toggleBtn" onclick="toggleStatus()">切替</button>
    </div>
  </div>

  <!-- パスコード設定 -->
  <div class="panel">
    <div class="panel-title">ワンタイムパスコード</div>
    <div class="pw-row">
      <input type="text" id="newPassword" placeholder="例: 4821" maxlength="20">
      <button class="btn" onclick="changePassword()">変更</button>
    </div>
  </div>

  <!-- ファイル一覧 -->
  <div class="panel">
    <div class="top-bar" style="margin-bottom:12px;">
      <div class="panel-title" style="margin-bottom:0;">提出ファイル</div>
      <button class="refresh-btn" onclick="loadFiles()">🔄 更新</button>
    </div>
    <ul class="file-list" id="fileList">
      <li class="empty-msg">読み込み中...</li>
    </ul>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwWtbXPW_qMSRleohR6XewZ4gD010FrJF8J-ZzP5cWH-WXS_OIZAV14lS9A2Z7a13dcnA/exec';

let adminPassword = '';
let currentStatus = '';

function login() {
  const pw = document.getElementById('adminPw').value.trim();
  if (!pw) return;
  adminPassword = pw;
  document.getElementById('loginErr').textContent = '';
  // パスワード確認のためファイル一覧を取得
  postGAS({ action: 'listFiles', adminPassword: pw }).then(data => {
    if (data.ok) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      loadStatus();
      renderFiles(data.files);
    } else {
      document.getElementById('loginErr').textContent = '❌ パスワードが違います';
      adminPassword = '';
    }
  }).catch(() => {
    document.getElementById('loginErr').textContent = '❌ 接続できませんでした';
  });
}

function logout() {
  adminPassword = '';
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminPw').value = '';
}

async function loadStatus() {
  const data = await postGAS({ action: 'getStatus' });
  currentStatus = data.status;
  updateStatusUI(data.status);
}

function updateStatusUI(status) {
  const badge = document.getElementById('statusBadge');
  const btn = document.getElementById('toggleBtn');
  if (status === 'open') {
    badge.textContent = '✅ 受付中';
    badge.className = 'status-badge open';
    btn.textContent = '🔒 締め切る';
    btn.className = 'toggle-btn open-action';
  } else {
    badge.textContent = '🔒 受付停止中';
    badge.className = 'status-badge closed';
    btn.textContent = '✅ 受付開始';
    btn.className = 'toggle-btn close-action';
  }
}

async function toggleStatus() {
  const newStatus = currentStatus === 'open' ? 'closed' : 'open';
  const data = await postGAS({ action: 'setStatus', adminPassword, status: newStatus });
  if (data.ok) {
    currentStatus = data.status;
    updateStatusUI(data.status);
    showToast(newStatus === 'open' ? '✅ 受付を開始しました' : '🔒 受付を締め切りました');
  } else {
    showToast('❌ ' + data.error);
  }
}

async function changePassword() {
  const pw = document.getElementById('newPassword').value.trim();
  if (!pw) { showToast('パスコードを入力してください'); return; }
  const data = await postGAS({ action: 'setPassword', adminPassword, newPassword: pw });
  if (data.ok) {
    showToast('✅ パスコードを「' + pw + '」に変更しました');
    document.getElementById('newPassword').value = '';
  } else {
    showToast('❌ ' + data.error);
  }
}

async function loadFiles() {
  document.getElementById('fileList').innerHTML = '<li class="empty-msg">読み込み中...</li>';
  const data = await postGAS({ action: 'listFiles', adminPassword });
  if (data.ok) renderFiles(data.files);
  else showToast('❌ ' + data.error);
}

function renderFiles(files) {
  const list = document.getElementById('fileList');
  if (!files || files.length === 0) {
    list.innerHTML = '<li class="empty-msg">📭 まだファイルがありません</li>';
    return;
  }
  list.innerHTML = files.map(f => `
    <li class="file-item">
      <span class="file-icon">${fileIcon(f.name)}</span>
      <div class="file-info">
        <div class="file-name-text">${f.name}</div>
        <div class="file-meta">${formatSize(f.size)} · ${formatDate(f.created)}</div>
      </div>
      <div class="file-actions">
        <button class="icon-btn download" onclick="downloadFile('${f.url}', '${f.name}')">⬇ DL</button>
        <button class="icon-btn delete" onclick="deleteFile('${f.id}', '${f.name}')">🗑 削除</button>
      </div>
    </li>
  `).join('');
}

function downloadFile(url, name) {
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.target = '_blank';
  a.click();
}

async function deleteFile(fileId, name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  const data = await postGAS({ action: 'deleteFile', adminPassword, fileId });
  if (data.ok) {
    showToast('🗑 削除しました');
    loadFiles();
  } else {
    showToast('❌ ' + data.error);
  }
}

function postGAS(body) {
  return fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(body)
  }).then(r => r.json());
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const map = { pdf:'📄', jpg:'🖼', jpeg:'🖼', png:'🖼', mp4:'🎬', mp3:'🎵', zip:'📦', mcworld:'🌍', mkcd:'🧱', txt:'📝' };
  return map[ext] || '📄';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/1024/1024).toFixed(1) + 'MB';
}

function formatDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
