<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📮 提出ポスト</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #0f1923;
    --surface: #162030;
    --border: #1e3048;
    --accent: #00c9a7;
    --accent2: #0ef0c0;
    --danger: #ff4d6d;
    --text: #e8f4f0;
    --text-dim: #6b8fa3;
    --glow: 0 0 30px rgba(0,201,167,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
    position: relative;
  }

  /* 背景グリッド */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,201,167,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,201,167,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* 背景グロー */
  body::after {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,201,167,0.06) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .icon-wrap {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #0a2a3a, #0f3348);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.2rem;
    font-size: 2rem;
    box-shadow: var(--glow);
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  h1 {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .subtitle {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 0.4rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    box-shadow: 0 4px 40px rgba(0,0,0,0.4);
  }

  /* パスワード画面 */
  #auth-screen { display: block; }
  #upload-screen { display: none; }
  #success-screen { display: none; }

  .field-label {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.6rem;
    display: block;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 1.5rem;
  }

  input[type="password"],
  input[type="text"] {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    padding: 0.85rem 1.2rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,201,167,0.12);
  }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #00a88e);
    color: #0a1f1a;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    border: none;
    border-radius: 10px;
    padding: 0.9rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-msg {
    color: var(--danger);
    font-size: 0.8rem;
    margin-top: 0.8rem;
    text-align: center;
    min-height: 1.2em;
  }

  /* ドロップゾーン */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    margin-bottom: 1.5rem;
  }

  .drop-zone:hover,
  .drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(0,201,167,0.05);
    box-shadow: inset 0 0 20px rgba(0,201,167,0.05);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 2.5rem;
    margin-bottom: 0.8rem;
    display: block;
    transition: transform 0.2s;
  }

  .drop-zone:hover .drop-icon { transform: translateY(-4px); }

  .drop-title {
    font-size: 1rem;
    font-weight: 500;
    margin-bottom: 0.4rem;
  }

  .drop-hint {
    font-size: 0.78rem;
    color: var(--text-dim);
  }

  .file-types {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 0.8rem;
  }

  .tag {
    background: rgba(0,201,167,0.1);
    border: 1px solid rgba(0,201,167,0.2);
    color: var(--accent);
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  /* 選択ファイル一覧 */
  .file-list {
    margin-bottom: 1.5rem;
    display: none;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.7rem 1rem;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.5rem;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .file-icon { font-size: 1.2rem; }

  .file-info { flex: 1; min-width: 0; }

  .file-name {
    font-size: 0.85rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-size {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 0.1rem;
  }

  .file-remove {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.2rem;
    transition: color 0.2s;
  }

  .file-remove:hover { color: var(--danger); }

  /* プログレスバー */
  .progress-wrap {
    margin-bottom: 1.5rem;
    display: none;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px rgba(0,201,167,0.5);
  }

  /* 成功画面 */
  .success-icon {
    font-size: 3rem;
    display: block;
    text-align: center;
    margin-bottom: 1rem;
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes pop {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .success-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.4rem;
    text-align: center;
    margin-bottom: 0.5rem;
    color: var(--accent);
  }

  .success-sub {
    font-size: 0.82rem;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .btn-ghost {
    width: 100%;
    background: transparent;
    color: var(--accent);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.88rem;
    border: 1px solid rgba(0,201,167,0.3);
    border-radius: 10px;
    padding: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-ghost:hover {
    background: rgba(0,201,167,0.08);
    border-color: var(--accent);
  }

  .footer-link {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .footer-link a {
    color: var(--accent);
    text-decoration: none;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(10,31,26,0.3);
    border-top-color: #0a1f1a;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="icon-wrap">📮</div>
    <h1>提出ポスト</h1>
    <p class="subtitle">File Submission Box</p>
  </div>

  <div class="card">

    <!-- 認証画面 -->
    <div id="auth-screen">
      <label class="field-label">投函パスワード</label>
      <div class="input-wrap">
        <input type="password" id="password-input" placeholder="パスワードを入力してください" autocomplete="off">
      </div>
      <button class="btn" id="auth-btn" onclick="authenticate()">入室する</button>
      <p class="error-msg" id="auth-error"></p>
    </div>

    <!-- アップロード画面 -->
    <div id="upload-screen">
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" multiple accept=".mcworld,.mkcd,.jpeg,.jpg,.png,.mp3,.mp4,.pdf,.zip,.txt">
        <span class="drop-icon">📁</span>
        <p class="drop-title">ファイルをここにドロップ</p>
        <p class="drop-hint">またはクリックしてファイルを選択</p>
        <div class="file-types">
          <span class="tag">.mcworld</span>
          <span class="tag">.mkcd</span>
        </div>
      </div>

      <div class="file-list" id="file-list"></div>

      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-label">
          <span id="progress-text">アップロード中...</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <button class="btn" id="upload-btn" onclick="uploadFiles()" disabled>
        投函する
      </button>
      <p class="error-msg" id="upload-error"></p>
    </div>

    <!-- 成功画面 -->
    <div id="success-screen">
      <span class="success-icon">✅</span>
      <h2 class="success-title">投函完了！</h2>
      <p class="success-sub">ファイルが先生のドライブに届きました</p>
      <button class="btn-ghost" onclick="resetUpload()">続けて投函する</button>
    </div>

  </div>

  <p class="footer-link">
    先生はこちら → <a href="admin.html">受取ページ</a>
  </p>
</div>

<script>
  // =============================================
  // ⚙️ 設定（デプロイ時に書き換えてください）
  // =============================================
  const CONFIG = {
    SUBMIT_PASSWORD: 'minecode',       // 投函パスワード
    FOLDER_ID: '1a4Uadgv-Favp9mLMH7Yqev-t-ptM_MTe', // GoogleドライブフォルダID
    SERVICE_ACCOUNT_TOKEN_URL: 'https://ancient-leaf-2d90.mycodepost.workers.dev', // トークン取得エンドポイント
  };
  // =============================================

  let selectedFiles = [];

  // Enterキーでログイン
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') authenticate();
  });

  function authenticate() {
    const pw = document.getElementById('password-input').value;
    if (pw === CONFIG.SUBMIT_PASSWORD) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('upload-screen').style.display = 'block';
    } else {
      const err = document.getElementById('auth-error');
      err.textContent = 'パスワードが違います';
      document.getElementById('password-input').value = '';
      document.getElementById('password-input').focus();
      setTimeout(() => err.textContent = '', 3000);
    }
  }

  // ドロップゾーン
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
  });

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    handleFiles([...e.dataTransfer.files]);
  });

  fileInput.addEventListener('change', () => {
    handleFiles([...fileInput.files]);
  });

  function handleFiles(files) {
    const allowed = ['.mcworld', '.mkcd', '.jpeg', '.jpg', '.png', '.mp3', '.mp4', '.pdf', '.zip', '.txt'];
    const valid = files.filter(f => allowed.some(ext => f.name.toLowerCase().endsWith(ext)));
    const invalid = files.filter(f => !allowed.some(ext => f.name.toLowerCase().endsWith(ext)));

    if (invalid.length > 0) {
      document.getElementById('upload-error').textContent =
        `⚠️ .mcworld / .mkcd 以外のファイルは投函できません`;
      setTimeout(() => document.getElementById('upload-error').textContent = '', 3000);
    }

    valid.forEach(f => {
      if (!selectedFiles.find(sf => sf.name === f.name)) {
        selectedFiles.push(f);
      }
    });

    renderFileList();
  }

  function renderFileList() {
    const list = document.getElementById('file-list');
    list.innerHTML = '';

    if (selectedFiles.length === 0) {
      list.style.display = 'none';
      document.getElementById('upload-btn').disabled = true;
      return;
    }

    list.style.display = 'block';
    document.getElementById('upload-btn').disabled = false;

    selectedFiles.forEach((f, i) => {
      const icon = f.name.endsWith('.mcworld') ? '🌍' : '⚙️';
      const size = f.size < 1024 * 1024
        ? (f.size / 1024).toFixed(1) + ' KB'
        : (f.size / 1024 / 1024).toFixed(1) + ' MB';

      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML = `
        <span class="file-icon">${icon}</span>
        <div class="file-info">
          <div class="file-name">${f.name}</div>
          <div class="file-size">${size}</div>
        </div>
        <button class="file-remove" onclick="removeFile(${i})">✕</button>
      `;
      list.appendChild(item);
    });
  }

  function removeFile(index) {
    selectedFiles.splice(index, 1);
    renderFileList();
  }

  async function uploadFiles() {
    if (selectedFiles.length === 0) return;

    const btn = document.getElementById('upload-btn');
    const progressWrap = document.getElementById('progress-wrap');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const progressPct = document.getElementById('progress-pct');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>アップロード中...';
    progressWrap.style.display = 'block';

    try {
      // アクセストークン取得
      const tokenRes = await fetch(CONFIG.SERVICE_ACCOUNT_TOKEN_URL);
      const { access_token } = await tokenRes.json();

      for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        const pct = Math.round((i / selectedFiles.length) * 100);
        progressFill.style.width = pct + '%';
        progressPct.textContent = pct + '%';
        progressText.textContent = `${file.name} をアップロード中...`;

        // タイムスタンプ付きファイル名
        const now = new Date();
        const stamp = now.toISOString().slice(0, 16).replace('T', '_').replace(':', '-');
        const newName = `${stamp}_${file.name}`;

        const metadata = {
          name: newName,
          parents: [CONFIG.FOLDER_ID],
        };

        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', file);

        const res = await fetch(
          'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
          {
            method: 'POST',
            headers: { Authorization: `Bearer ${access_token}` },
            body: form,
          }
        );

        if (!res.ok) { const errBody = await res.text(); throw new Error(`Upload failed: ${res.status} - ${errBody}`); }
      }

      progressFill.style.width = '100%';
      progressPct.textContent = '100%';

      await new Promise(r => setTimeout(r, 500));

      document.getElementById('upload-screen').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';

    } catch (err) {
      console.error(err);
      document.getElementById('upload-error').textContent =
        'アップロードに失敗しました。もう一度お試しください。';
      btn.disabled = false;
      btn.innerHTML = '投函する';
      progressWrap.style.display = 'none';
    }
  }

  function resetUpload() {
    selectedFiles = [];
    document.getElementById('file-list').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('upload-btn').innerHTML = '投函する';
    document.getElementById('upload-btn').disabled = true;
    document.getElementById('upload-error').textContent = '';
    document.getElementById('success-screen').style.display = 'none';
    document.getElementById('upload-screen').style.display = 'block';
  }
</script>
</body>
</html>
