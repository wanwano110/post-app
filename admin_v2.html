<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📬 受取ボックス</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #0f1923;
    --surface: #162030;
    --surface2: #1a2840;
    --border: #1e3048;
    --accent: #00c9a7;
    --accent2: #0ef0c0;
    --danger: #ff4d6d;
    --warn: #ffb347;
    --text: #e8f4f0;
    --text-dim: #6b8fa3;
    --glow: 0 0 30px rgba(0,201,167,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,201,167,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,201,167,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* 認証画面 */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: -2rem;
    padding: 2rem;
  }

  #main-screen { display: none; }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.5);
  }

  .logo {
    text-align: center;
    margin-bottom: 2rem;
  }

  .icon-wrap {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #0a2a3a, #0f3348);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    font-size: 2rem;
    box-shadow: var(--glow);
  }

  h1 {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.6rem;
    font-weight: 700;
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .field-label {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.6rem;
    display: block;
  }

  input[type="password"] {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    padding: 0.85rem 1.2rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 1.2rem;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,201,167,0.12);
  }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #00a88e);
    color: #0a1f1a;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    border: none;
    border-radius: 10px;
    padding: 0.9rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }

  .error-msg {
    color: var(--danger);
    font-size: 0.8rem;
    margin-top: 0.8rem;
    text-align: center;
    min-height: 1.2em;
  }

  /* メイン画面 */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }

  .top-bar-left {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .top-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #0a2a3a, #0f3348);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
  }

  .top-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.3rem;
  }

  .top-sub {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 0.1rem;
  }

  .top-actions {
    display: flex;
    gap: 0.7rem;
    align-items: center;
  }

  .btn-sm {
    background: rgba(0,201,167,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,201,167,0.25);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-sm:hover {
    background: rgba(0,201,167,0.18);
    border-color: var(--accent);
  }

  .btn-danger-sm {
    background: rgba(255,77,109,0.1);
    color: var(--danger);
    border: 1px solid rgba(255,77,109,0.25);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-danger-sm:hover {
    background: rgba(255,77,109,0.18);
    border-color: var(--danger);
  }

  /* 統計バー */
  .stats-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    position: relative;
    z-index: 1;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.3rem;
    flex: 1;
  }

  .stat-val {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.6rem;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
    letter-spacing: 0.08em;
  }

  /* フィルター */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.2rem;
    position: relative;
    z-index: 1;
  }

  .filter-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.35rem 0.9rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: rgba(0,201,167,0.1);
    color: var(--accent);
    border-color: rgba(0,201,167,0.3);
  }

  .filter-btn:hover:not(.active) {
    color: var(--text);
    border-color: #2d4a60;
  }

  /* ファイル一覧 */
  .file-grid {
    position: relative;
    z-index: 1;
  }

  .file-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 0.6rem;
    transition: border-color 0.2s, background 0.2s;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .file-row:hover { border-color: #2d4a60; background: var(--surface2); }

  .file-row-icon { font-size: 1.5rem; flex-shrink: 0; }

  .file-row-info { flex: 1; min-width: 0; }

  .file-row-name {
    font-size: 0.9rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-row-meta {
    display: flex;
    gap: 1rem;
    margin-top: 0.25rem;
  }

  .meta-item {
    font-size: 0.72rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .badge {
    font-size: 0.65rem;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    font-weight: 500;
  }

  .badge-world {
    background: rgba(0,201,167,0.12);
    color: var(--accent);
    border: 1px solid rgba(0,201,167,0.2);
  }

  .badge-mkcd {
    background: rgba(255,179,71,0.12);
    color: var(--warn);
    border: 1px solid rgba(255,179,71,0.2);
  }

  .file-row-actions {
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    transition: all 0.2s;
  }

  .icon-btn:hover {
    background: rgba(0,201,167,0.1);
    color: var(--accent);
    border-color: rgba(0,201,167,0.3);
  }

  .icon-btn.del:hover {
    background: rgba(255,77,109,0.1);
    color: var(--danger);
    border-color: rgba(255,77,109,0.3);
  }

  /* 空状態 */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
  }

  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }

  .empty-title { font-size: 1rem; margin-bottom: 0.5rem; }

  .empty-sub { font-size: 0.8rem; }

  /* ローディング */
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--text-dim);
  }

  .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 確認モーダル */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 8px 60px rgba(0,0,0,0.6);
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.1rem;
    margin-bottom: 0.6rem;
  }

  .modal-body {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .modal-actions {
    display: flex;
    gap: 0.7rem;
  }

  .modal-cancel {
    flex: 1;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-cancel:hover { border-color: #2d4a60; color: var(--text); }

  .modal-confirm {
    flex: 1;
    background: var(--danger);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.7rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .modal-confirm:hover { opacity: 0.85; }

  .logout-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .logout-btn:hover { color: var(--text); border-color: #2d4a60; }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a3a2e;
    border: 1px solid rgba(0,201,167,0.3);
    color: var(--accent);
    padding: 0.7rem 1.5rem;
    border-radius: 30px;
    font-size: 0.85rem;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- 認証画面 -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="logo">
      <div class="icon-wrap">📬</div>
      <h1>受取ボックス</h1>
      <p class="subtitle">Admin Panel</p>
    </div>
    <label class="field-label">管理者パスワード</label>
    <input type="password" id="admin-password" placeholder="パスワードを入力してください" autocomplete="off">
    <button class="btn" onclick="adminAuth()">ログイン</button>
    <p class="error-msg" id="admin-error"></p>
  </div>
</div>

<!-- メイン画面 -->
<div id="main-screen">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-icon">📬</div>
      <div>
        <div class="top-title">受取ボックス</div>
        <div class="top-sub">Admin Panel</div>
      </div>
    </div>
    <div class="top-actions">
      <button class="btn-sm" onclick="loadFiles()">🔄 更新</button>
      <button class="btn-danger-sm" onclick="confirmDeleteAll()">🗑 全削除</button>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </div>

  <!-- 統計 -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-val" id="stat-total">—</div>
      <div class="stat-label">合計ファイル数</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-world">—</div>
      <div class="stat-label">.mcworld</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-mkcd">—</div>
      <div class="stat-label">.mkcd</div>
    </div>
  </div>

  <!-- フィルター -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
    <button class="filter-btn" onclick="setFilter('mcworld', this)">.mcworld</button>
    <button class="filter-btn" onclick="setFilter('mkcd', this)">.mkcd</button>
  </div>

  <!-- ファイル一覧 -->
  <div class="file-grid" id="file-grid">
    <div class="loading">
      <div class="spinner"></div>
      <div>読み込み中...</div>
    </div>
  </div>
</div>

<!-- 削除確認モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">削除の確認</div>
    <div class="modal-body" id="modal-body">このファイルを削除しますか？</div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="modal-confirm" id="modal-confirm-btn">削除する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // =============================================
  // ⚙️ 設定（デプロイ時に書き換えてください）
  // =============================================
  const CONFIG = {
    ADMIN_PASSWORD: 'minepost',             // 管理者パスワード
    FOLDER_ID: '1a4Uadgv-Favp9mLMH7Yqev-t-ptM_MTe', // GoogleドライブフォルダID
    SERVICE_ACCOUNT_TOKEN_URL: 'https://ancient-leaf-2d90.mycodepost.workers.dev',
  };
  // =============================================

  let allFiles = [];
  let currentFilter = 'all';
  let accessToken = '';

  document.getElementById('admin-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') adminAuth();
  });

  async function adminAuth() {
    const pw = document.getElementById('admin-password').value;
    if (pw === CONFIG.ADMIN_PASSWORD) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'block';
      await loadFiles();
    } else {
      const err = document.getElementById('admin-error');
      err.textContent = 'パスワードが違います';
      document.getElementById('admin-password').value = '';
      setTimeout(() => err.textContent = '', 3000);
    }
  }

  async function getToken() {
    const res = await fetch(CONFIG.SERVICE_ACCOUNT_TOKEN_URL);
    const data = await res.json();
    accessToken = data.access_token;
    return accessToken;
  }

  async function loadFiles() {
    document.getElementById('file-grid').innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <div>読み込み中...</div>
      </div>`;

    try {
      await getToken();
      const res = await fetch(
        `https://www.googleapis.com/drive/v3/files?q='${CONFIG.FOLDER_ID}'+in+parents+and+trashed=false&fields=files(id,name,size,createdTime,mimeType)&orderBy=createdTime+desc`,
        { headers: { Authorization: `Bearer ${accessToken}` } }
      );
      const data = await res.json();
      allFiles = data.files || [];
      updateStats();
      renderFiles();
    } catch (err) {
      document.getElementById('file-grid').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <div class="empty-title">読み込みに失敗しました</div>
          <div class="empty-sub">ネットワーク接続を確認してください</div>
        </div>`;
    }
  }

  function updateStats() {
    const worlds = allFiles.filter(f => f.name.toLowerCase().endsWith('.mcworld'));
    const mkcds = allFiles.filter(f => f.name.toLowerCase().endsWith('.mkcd'));
    document.getElementById('stat-total').textContent = allFiles.length;
    document.getElementById('stat-world').textContent = worlds.length;
    document.getElementById('stat-mkcd').textContent = mkcds.length;
  }

  function setFilter(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFiles();
  }

  function renderFiles() {
    const grid = document.getElementById('file-grid');
    let files = allFiles;

    if (currentFilter !== 'all') {
      files = files.filter(f => f.name.toLowerCase().endsWith('.' + currentFilter));
    }

    if (files.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">ファイルはまだありません</div>
          <div class="empty-sub">生徒が投函すると、ここに表示されます</div>
        </div>`;
      return;
    }

    grid.innerHTML = files.map(f => {
      const ext = f.name.toLowerCase().split('.').pop(); const isMcworld = ext === 'mcworld';
      const icon = isMcworld ? '🌍' : ['jpg','jpeg','png'].includes(ext) ? '🖼️' : ext === 'mp3' ? '🎵' : ext === 'mp4' ? '🎬' : ext === 'pdf' ? '📄' : ext === 'zip' ? '🗜️' : ext === 'txt' ? '📝' : '⚙️';
      const badge = isMcworld
        ? '<span class="badge badge-world">.mcworld</span>'
        : '<span class="badge badge-mkcd">.mkcd</span>';
      const size = f.size
        ? (parseInt(f.size) < 1024 * 1024
            ? (parseInt(f.size) / 1024).toFixed(1) + ' KB'
            : (parseInt(f.size) / 1024 / 1024).toFixed(1) + ' MB')
        : '—';
      const date = new Date(f.createdTime).toLocaleString('ja-JP', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });

      return `
        <div class="file-row" id="row-${f.id}">
          <div class="file-row-icon">${icon}</div>
          <div class="file-row-info">
            <div class="file-row-name">${f.name}</div>
            <div class="file-row-meta">
              ${badge}
              <span class="meta-item">📦 ${size}</span>
              <span class="meta-item">🕐 ${date}</span>
            </div>
          </div>
          <div class="file-row-actions">
            <button class="icon-btn" onclick="downloadFile('${f.id}', '${f.name}')" title="ダウンロード">⬇️</button>
            <button class="icon-btn del" onclick="confirmDelete('${f.id}', '${f.name}')" title="削除">🗑</button>
          </div>
        </div>`;
    }).join('');
  }

  async function downloadFile(fileId, fileName) {
    showToast('⬇️ ダウンロード開始...');
    try {
      const res = await fetch(
        `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
        { headers: { Authorization: `Bearer ${accessToken}` } }
      );
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      a.click();
      URL.revokeObjectURL(url);
      showToast('✅ ダウンロード完了');
    } catch {
      showToast('❌ ダウンロード失敗');
    }
  }

  let pendingDeleteId = null;

  function confirmDelete(fileId, fileName) {
    pendingDeleteId = fileId;
    document.getElementById('modal-title').textContent = 'ファイルの削除';
    document.getElementById('modal-body').textContent = `「${fileName}」を削除しますか？この操作は元に戻せません。`;
    document.getElementById('modal-confirm-btn').onclick = () => deleteFile(fileId);
    document.getElementById('modal').classList.add('open');
  }

  function confirmDeleteAll() {
    if (allFiles.length === 0) return showToast('削除するファイルがありません');
    document.getElementById('modal-title').textContent = 'すべてのファイルを削除';
    document.getElementById('modal-body').textContent = `${allFiles.length}件のファイルをすべて削除しますか？この操作は元に戻せません。`;
    document.getElementById('modal-confirm-btn').onclick = deleteAll;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    pendingDeleteId = null;
  }

  async function deleteFile(fileId) {
    closeModal();
    try {
      await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      allFiles = allFiles.filter(f => f.id !== fileId);
      updateStats();
      renderFiles();
      showToast('🗑 削除しました');
    } catch {
      showToast('❌ 削除に失敗しました');
    }
  }

  async function deleteAll() {
    closeModal();
    showToast('🗑 削除中...');
    try {
      await Promise.all(allFiles.map(f =>
        fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${accessToken}` }
        })
      ));
      allFiles = [];
      updateStats();
      renderFiles();
      showToast('✅ すべて削除しました');
    } catch {
      showToast('❌ 一部の削除に失敗しました');
      loadFiles();
    }
  }

  function logout() {
    accessToken = '';
    allFiles = [];
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('admin-password').value = '';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // モーダル外クリックで閉じる
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });
</script>
</body>
</html>
