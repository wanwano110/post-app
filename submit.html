<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📮 提出ポスト</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #d8f3dc;
    --yellow: #f4a261;
    --bg: #f0f7f1;
    --text: #1b2f22;
    --gray: #888;
    --radius: 16px;
  }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #fff;
    border-radius: var(--radius);
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 24px rgba(45,106,79,0.10);
  }

  .logo {
    font-size: 48px;
    text-align: center;
    margin-bottom: 8px;
  }

  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 32px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--green-pale);
    border-radius: 10px;
    font-size: 18px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
    letter-spacing: 0.2em;
    text-align: center;
    color: var(--text);
  }

  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--green-light);
  }

  .drop-area {
    border: 2.5px dashed var(--green-light);
    border-radius: var(--radius);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    margin-bottom: 24px;
    background: var(--green-pale);
    position: relative;
  }

  .drop-area.dragover {
    background: #b7e4c7;
    border-color: var(--green);
  }

  .drop-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon { font-size: 36px; margin-bottom: 8px; }

  .drop-text {
    font-size: 14px;
    color: var(--green);
    font-weight: 700;
  }

  .drop-sub {
    font-size: 12px;
    color: var(--gray);
    margin-top: 4px;
  }

  .file-list {
    margin-top: 10px;
    text-align: left;
  }

  .file-list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--green);
    font-weight: 700;
    padding: 4px 0;
    border-bottom: 1px solid var(--green-pale);
    word-break: break-all;
    gap: 8px;
  }

  .file-list-item:last-child { border-bottom: none; }

  .remove-btn {
    width: auto;
    background: none;
    color: #c0392b;
    font-size: 16px;
    padding: 0 4px;
    border-radius: 4px;
    flex-shrink: 0;
    line-height: 1;
  }

  .remove-btn:hover { background: #fde8e8; }

  button {
    width: 100%;
    padding: 16px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.05em;
  }

  button:hover { background: #1b4332; }
  button:active { transform: scale(0.98); }
  button:disabled { background: #aaa; cursor: not-allowed; }

  .msg {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    display: none;
  }

  .msg.success { background: var(--green-pale); color: var(--green); display: block; }
  .msg.error   { background: #fde8e8; color: #c0392b; display: block; }

  .status-badge {
    text-align: center;
    font-size: 13px;
    margin-bottom: 20px;
    padding: 6px 14px;
    border-radius: 20px;
    display: inline-block;
    width: 100%;
  }

  .status-badge.open   { background: var(--green-pale); color: var(--green); }
  .status-badge.closed { background: #fde8e8; color: #c0392b; }

  .progress-wrap {
    background: var(--green-pale);
    border-radius: 8px;
    height: 8px;
    margin-top: 16px;
    overflow: hidden;
    display: none;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: var(--green-light);
    border-radius: 8px;
    transition: width 0.3s;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">📮</div>
  <h1>提出ポスト</h1>

  <div id="statusBadge" class="status-badge">確認中...</div>

  <div id="formArea">
    <label>パスコード</label>
    <input type="password" id="password" placeholder="0000" maxlength="20" autocomplete="off">

    <div class="drop-area" id="dropArea">
      <input type="file" id="fileInput" multiple>
      <div class="drop-icon">📁</div>
      <div class="drop-text">ファイルをここに置く</div>
      <div class="drop-sub">複数ファイルを同時に選択できます</div>
    </div>
    <div class="file-list" id="fileList"></div>

    <button id="submitBtn" onclick="submitFile()" disabled>投函する 📬</button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwWtbXPW_qMSRleohR6XewZ4gD010FrJF8J-ZzP5cWH-WXS_OIZAV14lS9A2Z7a13dcnA/exec';

const ALLOWED_EXT = ['mcworld','mkcd','jpg','jpeg','png','mp3','mp4','pdf','zip','txt'];
const MAX_SIZE = 20 * 1024 * 1024; // 20MB

let selectedFiles = [];

// 状態確認
async function checkStatus() {
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'getStatus' })
    });
    const data = await res.json();
    const badge = document.getElementById('statusBadge');
    if (data.status === 'open') {
      badge.textContent = '✅ 受付中';
      badge.className = 'status-badge open';
    } else {
      badge.textContent = '🔒 現在、受付していません';
      badge.className = 'status-badge closed';
      document.getElementById('formArea').style.opacity = '0.4';
      document.getElementById('formArea').style.pointerEvents = 'none';
    }
  } catch(e) {
    document.getElementById('statusBadge').textContent = '⚠ 状態を確認できません';
  }
}

// ファイル選択
const fileInput = document.getElementById('fileInput');
const dropArea = document.getElementById('dropArea');

fileInput.addEventListener('change', () => addFiles(fileInput.files));

dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('dragover'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
dropArea.addEventListener('drop', e => {
  e.preventDefault();
  dropArea.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});

function addFiles(files) {
  for (const file of files) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!ALLOWED_EXT.includes(ext)) {
      showMsg(`「${file.name}」は使えないファイル形式です。`, 'error');
      continue;
    }
    if (file.size > MAX_SIZE) {
      showMsg(`「${file.name}」が大きすぎます（20MB以内）`, 'error');
      continue;
    }
    if (!selectedFiles.find(f => f.name === file.name)) {
      selectedFiles.push(file);
    }
  }
  renderFileList();
  updateBtn();
}

function removeFile(name) {
  selectedFiles = selectedFiles.filter(f => f.name !== name);
  renderFileList();
  updateBtn();
}

function renderFileList() {
  const list = document.getElementById('fileList');
  if (selectedFiles.length === 0) { list.innerHTML = ''; return; }
  list.innerHTML = selectedFiles.map(f => `
    <div class="file-list-item">
      <span>📄 ${f.name}</span>
      <button class="remove-btn" onclick="removeFile('${f.name}')">✕</button>
    </div>
  `).join('');
}

document.getElementById('password').addEventListener('input', updateBtn);

function updateBtn() {
  const pw = document.getElementById('password').value.trim();
  document.getElementById('submitBtn').disabled = !(pw && selectedFiles.length > 0);
}

// 投函
async function submitFile() {
  const pw = document.getElementById('password').value.trim();
  if (!pw || selectedFiles.length === 0) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;

  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  progressWrap.style.display = 'block';

  let successCount = 0;
  let errorCount = 0;

  for (let i = 0; i < selectedFiles.length; i++) {
    const file = selectedFiles[i];
    btn.textContent = `送信中... (${i+1}/${selectedFiles.length})`;
    progressBar.style.width = Math.round((i / selectedFiles.length) * 90) + '%';

    try {
      const base64 = await toBase64(file);
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'upload',
          password: pw,
          fileName: file.name,
          mimeType: file.type || 'application/octet-stream',
          fileData: base64
        })
      });
      const data = await res.json();
      if (data.ok) successCount++;
      else { errorCount++; showMsg('❌ ' + data.error, 'error'); break; }
    } catch(e) {
      errorCount++;
      showMsg('❌ 送信に失敗しました。やり直してください。', 'error');
      break;
    }
  }

  progressBar.style.width = '100%';

  if (errorCount === 0) {
    showMsg(`✅ ${successCount}件 提出しました！`, 'success');
    selectedFiles = [];
    fileInput.value = '';
    renderFileList();
    document.getElementById('password').value = '';
  }

  btn.disabled = false;
  btn.textContent = '投函する 📬';
  progressWrap.style.display = 'none';
  progressBar.style.width = '0%';
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

checkStatus();
</script>
</body>
</html>
